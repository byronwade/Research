name: Apply production-ready Research documentation

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read
  pull-requests: write

concurrency:
  group: apply-production-ready-research-docs
  cancel-in-progress: false

jobs:
  apply:
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.body == '/apply-production-docs' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out trusted main workflow
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Reconstruct verified patch from PR comments
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          comments=/tmp/research-production-comments.json
          encoded=/tmp/research-production.patch.xz.b64
          archive=/tmp/research-production.patch.xz
          patch_file=/tmp/research-production.patch
          number='${{ github.event.issue.number }}'

          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/issues/${number}/comments?per_page=100" > "$comments"
          jq -r '
            [ .[][]
              | .body as $body
              | select($body | startswith("RESEARCH_PRODUCTION_PATCH_PART_"))
              | ($body | split("\n")) as $lines
              | {
                  index: ($lines[0] | sub("RESEARCH_PRODUCTION_PATCH_PART_"; "") | tonumber),
                  payload: ($lines[1:] | join(""))
                }
            ]
            | sort_by(.index)
            | if length != 7 then error("Expected exactly 7 production patch comments") else . end
            | if ([.[].index] != [0,1,2,3,4,5,6]) then error("Production patch comment indexes are incomplete") else . end
            | map(.payload)
            | join("")
          ' "$comments" > "$encoded"

          encoded_bytes="$(wc -c < "$encoded" | tr -d ' ')"
          [[ "$encoded_bytes" -eq 333360 ]] || { echo "Expected 333360 encoded bytes, found $encoded_bytes" >&2; exit 1; }
          base64 --decode "$encoded" > "$archive"
          expected='4bd79955cb3e6d549d9f1d286183aff4aecd7c84c3191d8c0fbe486288365309'
          actual="$(sha256sum "$archive" | awk '{print $1}')"
          [[ "$actual" == "$expected" ]] || { echo "Patch archive checksum mismatch: $actual" >&2; exit 1; }
          xz -t "$archive"
          xz --decompress --stdout "$archive" > "$patch_file"
          echo "patch_file=$patch_file" >> "$GITHUB_OUTPUT"

      - name: Apply, validate, and publish
        shell: bash
        run: |
          set -euo pipefail
          patch_file='${{ steps.patch.outputs.patch_file }}'
          publish=/tmp/research-production-publish
          rm -rf "$publish"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$publish"
          cd "$publish"
          git checkout main

          base='f527e611aa2b46d838c1045453fd209efe8c1458'
          git merge-base --is-ancestor "$base" HEAD || { echo 'Expected baseline is not an ancestor of main.' >&2; exit 1; }
          unexpected="$(git diff --name-only "$base"..HEAD | grep -v '^.github/workflows/apply-production-docs.yml$' || true)"
          [[ -z "$unexpected" ]] || { echo 'Main changed outside the one-time workflow after the snapshot:' >&2; echo "$unexpected" >&2; exit 1; }

          git apply --index --3way --whitespace=nowarn "$patch_file"
          rm -rf .production-docs-patch .production-docs-patch16
          rm -f .github/workflows/apply-production-docs.yml
          git add -A

          npm run agent:check
          git diff --cached --check

          git config user.name 'Research documentation publisher'
          git config user.email 'actions@users.noreply.github.com'
          git commit -m 'docs: establish production-ready implementation control plane'
          git push origin main

      - name: Close trigger pull request
        if: success()
        shell: bash
        run: gh pr close "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY" --comment 'The production-ready documentation control plane was validated and published directly to main.'
