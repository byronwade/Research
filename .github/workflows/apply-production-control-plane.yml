          EOF

          cat > docs/_meta/agent-routing.json <<'EOF'
          {
            "version": 1,
            "alwaysRead": ["AGENTS.md","docs/START-HERE.md","SECURITY.md","docs/06-delivery/implementation-status.md"],
            "prefixRoutes": {
