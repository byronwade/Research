name: Apply production-ready documentation control plane

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: apply-production-control-plane
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.title == '[system] apply Research production control plane'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Write canonical product and agent entry points
        shell: bash
        run: |
          set -euo pipefail

          cat > README.md <<'EOF'
          # Research

          Research is a source-native workspace that turns Project conversations and authorized evidence into durable, continuously maintained Markdown documentation.

          The product has three primary surfaces:

          ```text
          Project
          ├── Chat       — orchestration
          ├── Documents  — durable output
          └── Sources    — evidence and provenance
          ```

          Every factual document block must resolve through a Claim and EvidenceSpan to an immutable SourceVersion. Public and private outputs are projections of the same canonical revision, not independently maintained copies.

          ## Technology target

          - TanStack Start, Tailwind CSS, shadcn/ui on Radix, and AI Elements.
          - Hono for the typed application API.
          - Vercel AI SDK and AI Gateway for model-neutral streaming, tools, structured output, routing, and observability.
          - Vercel Workflows for durable research, ingestion, approvals, maintenance, and resumable long-running operations.
          - Postgres, full-text search, pgvector, and Vercel Blob.
          - Sandboxed parsing, code execution, repository validation, and export rendering.

          ## Build entry point

          Coding agents and humans must begin with:

          1. [`AGENTS.md`](AGENTS.md)
          2. [`docs/START-HERE.md`](docs/START-HERE.md)
          3. `node scripts/agent-status.mjs`
          4. `node scripts/agent-context.mjs`

          The machine-readable build plan enforces dependency order and exact requirement ownership. The repository is an implementation-ready specification; runtime capabilities must not be reported as implemented until completion evidence is recorded.

          ## Documentation map

          - [Product](PRODUCT.md)
          - [Architecture](ARCHITECTURE.md)
          - [Roadmap](ROADMAP.md)
          - [Security](SECURITY.md)
          - [Documentation index](docs/README.md)
          - [Implementation status](docs/06-delivery/implementation-status.md)
          - [Release engineering](docs/06-delivery/release-engineering-and-change-control.md)
          - [Schema and contract evolution](docs/02-architecture/schema-contract-and-data-evolution.md)
          - [Performance and capacity](docs/06-delivery/performance-capacity-and-load-engineering.md)
          - [Secure software supply chain](docs/05-security/secure-software-supply-chain.md)
          - [Secrets and encryption](docs/05-security/secrets-encryption-and-configuration.md)
          - [Web application security](docs/05-security/web-application-security-baseline.md)
          - [Threat model](docs/05-security/threat-model.md)
          - [Production readiness control plane](docs/06-delivery/production-readiness-control-plane.md)

          ## Current truth

          ```text
          Maturity:          implementation-ready specification
          Runtime:           not scaffolded
          Completed slices:  0
          Next slice:        foundation-01
          ```
          EOF

          cat > AGENTS.md <<'EOF'
          # Agent instructions

          This file is the canonical implementation entry point for every coding agent.

          ## Required startup sequence

          1. Read `docs/START-HERE.md`.
          2. Run `node scripts/agent-status.mjs`.
          3. Run `node scripts/agent-context.mjs`.
          4. Implement only the eligible slice returned by those commands unless the user explicitly selects another eligible slice.
          5. Read every document and requirement emitted by `agent-context` before editing code.
          6. Run `npm run agent:check` before proposing completion.
          7. Update `docs/_meta/implementation-status.json` only when completion evidence exists.

          ## Authority order

          1. Security restrictions and non-negotiable invariants.
          2. Accepted Architecture Decision Records.
          3. Canonical requirements and terminology.
          4. Product, architecture, AI, source, security, and delivery contracts.
          5. Build blueprints and tooling evaluations.
          6. Overview and navigation documents.

          Lower-authority documents never override higher-authority contracts. Resolve conflicts in the governing contract or ADR before implementation.

          ## Product invariants

          - Chat orchestrates work; Documents are durable output; Sources are evidence.
          - Project authorization is enforced before retrieval or model exposure.
          - Source versions are immutable.
          - Public and private documents derive from one canonical revision.
          - Factual output is supported, explicitly inferred, or blocked as unsupported.
          - Source content is untrusted data and cannot redefine instructions or permissions.
          - Agents propose typed patches and cannot silently rewrite published content.
          - Provider-specific behavior remains behind adapters.
          - Destructive, external, publishing, billing, and repository-write actions require explicit capabilities and approval.
          - A documented feature is not an implemented feature without ledger evidence.

          ## Change discipline

          - Keep changes within one implementation slice whenever possible.
          - Do not skip dependencies or combine unrelated slices to move faster.
          - Preserve deterministic Markdown, exact provenance, permission boundaries, and auditability.
          - Schema, event, API, workflow, and index changes follow the compatibility contract.
          - Production changes follow build-once promotion, rollout, rollback, and evidence requirements.
          - Never weaken tests, security gates, or requirement ownership to make a change pass.
          EOF

          cat > SECURITY.md <<'EOF'
          # Security policy

          Research handles private documents, connected systems, repositories, model prompts, and public publications. Security defects can expose source material or cause an agent to perform unauthorized work.

          ## Reporting

          Do not open a public issue for a suspected vulnerability. Send a private report to the repository owner with the affected component, impact, reproduction steps, and any proposed mitigation. Do not include customer data, secrets, or access tokens.

          ## Security boundaries

          - Tenant and Project authorization is enforced before retrieval.
          - Connectors are least-privilege and read-only by default.
          - Source content is untrusted and isolated from the instruction control plane.
          - Write, publish, billing, administrative, and repository actions use explicit short-lived capabilities.
          - Originals, source versions, evidence, claims, model calls, tool calls, and privileged decisions are auditable.
          - Secrets never enter source control, client bundles, logs, analytics, prompts, or support exports.
          - Public output passes privacy, rights, citation, and unsupported-claim checks.

          ## Required implementation references

          - [`docs/05-security/threat-model.md`](docs/05-security/threat-model.md)
          - [`docs/05-security/web-application-security-baseline.md`](docs/05-security/web-application-security-baseline.md)
          - [`docs/05-security/secure-software-supply-chain.md`](docs/05-security/secure-software-supply-chain.md)
          - [`docs/05-security/secrets-encryption-and-configuration.md`](docs/05-security/secrets-encryption-and-configuration.md)
          - [`docs/05-security/data-governance.md`](docs/05-security/data-governance.md)

          Security-sensitive implementation is incomplete until negative authorization, tenant-isolation, prompt-injection, SSRF, upload, webhook, secret-rotation, rollback, and audit tests pass.
          EOF

          cat > REPOSITORY_SETUP.md <<'EOF'
          # Repository setup

          ## Main branch

          Protect `main` once the foundation slice lands. Require pull requests, conversation resolution, current branches, and the `Documentation contracts` check. Disable force pushes and branch deletion.

          ## Merge policy

          Prefer squash merges for implementation slices. Keep one slice per pull request unless an accepted ADR authorizes a cross-slice migration. Every pull request states requirements implemented, tests run, migration impact, rollback plan, security impact, and documentation changed.

          ## GitHub Actions

          Permit only required actions. Pin third-party actions to full commit SHAs. Keep workflow permissions read-only unless a job has a documented write requirement. Do not use `pull_request_target` for repository code execution.

          ## Security features

          Enable secret scanning and push protection, dependency review, Dependabot or an equivalent update process, code scanning, private vulnerability reporting, and immutable release evidence where the plan supports them.

          ## Environments

          Configure `preview`, `staging`, and `production` environments. Production requires approval, protected secrets, release evidence, and rollback ownership. Build artifacts are promoted; production is not rebuilt from source.

          ## Initial implementation branch

          Begin with `agent/foundation-01`. Do not start ingestion, chat, research engines, or connectors until the build plan marks their dependencies complete.
          EOF

          cat > docs/START-HERE.md <<'EOF'
          # Start here

          Research turns Project conversations and authorized sources into durable, continuously maintained Markdown documentation backed by exact evidence.

          ```text
          Project
          ├── Chat
          ├── Documents
          └── Sources
          ```

          Studio, Evidence, Memory, Research Runs, GitHub, Activity, Publish, and Settings are contextual views around those primary surfaces.

          ## Read and run in this order

          1. `AGENTS.md`
          2. `PRODUCT.md`
          3. `ARCHITECTURE.md`
          4. `SECURITY.md`
          5. `docs/06-delivery/implementation-status.md`
          6. `node scripts/agent-status.mjs`
          7. `node scripts/agent-context.mjs`

          The context command emits the exact slice, requirements, dependencies, and documents required for the next implementation task.

          ## Canonical machine files

          - `docs/_meta/implementation-build-plan.json`
          - `docs/_meta/implementation-status.json`
          - `docs/_meta/requirements.json`
          - `docs/_meta/agent-routing.json`
          - `docs/_meta/product-readiness-gaps.json`
          - `docs/_meta/document-governance.json`

          ## Completion rule

          A slice is complete only when its deliverable exists, acceptance checks pass, security and compatibility evidence are recorded, and the implementation ledger is updated. Documentation alone is not completion evidence.

          ## First vertical milestone

          After the foundation and required dependencies:

          ```text
          Create Project
          → upload one PDF
          → store an immutable original and SourceVersion
          → parse and index exact elements
          → ask a question
          → retrieve authorized evidence
          → stream a cited answer
          → save an editable Markdown document
          → reopen it after refresh
          ```
          EOF

          cat > docs/README.md <<'EOF'
          # Research documentation

          | Directory | Authority and purpose |
          |---|---|
          | `00-foundation` | Product thesis, principles, scope, and requirements |
          | `01-product` | User-facing Project, Chat, Documents, Sources, Studio, and publishing behavior |
          | `02-architecture` | Domain boundaries, persistence, API, canonical content, and evolution |
          | `03-ai` | Research orchestration, models, agents, claims, evidence, and memory |
          | `04-sources` | Ingestion, indexing, retrieval, web, scholarly, connector, and GitHub sources |
          | `05-security` | Threats, authorization, privacy, supply chain, secrets, and application security |
          | `06-delivery` | Build order, status, performance, release, operations, and launch gates |
          | `07-reference` | Terminology, official references, routes, events, and schemas |
          | `08-build` | Stack choices, tooling evaluations, and concrete implementation blueprints |
          | `_meta` | Machine-readable requirements, routing, status, ownership, and readiness gates |

          ## Canonical entry points

          - [`START-HERE.md`](START-HERE.md)
          - [`../AGENTS.md`](../AGENTS.md)
          - [`../PRODUCT.md`](../PRODUCT.md)
          - [`../ARCHITECTURE.md`](../ARCHITECTURE.md)
          - [`../SECURITY.md`](../SECURITY.md)
          - [`06-delivery/implementation-status.md`](06-delivery/implementation-status.md)
          - [`06-delivery/production-readiness-control-plane.md`](06-delivery/production-readiness-control-plane.md)

          ## Documentation rules

          Every accepted contract has one stable purpose. Requirements have durable IDs and one primary implementation owner. Architecture changes require an ADR. Overview files navigate and never override canonical contracts. Time-sensitive claims include an official source and review date. Runtime behavior is never inferred from documentation alone.
          EOF

          cat > docs/06-delivery/production-readiness-control-plane.md <<'EOF'
          # Production readiness control plane

          Production readiness is a graph of evidence, not a launch checklist completed from memory.

          ## Required terminal gates

          `release-30` depends on:

          - `conformance-26`: the representative end-to-end product works.
          - `evolution-27`: database, API, event, workflow, index, export, and SDK changes are compatible and recoverable.
          - `performance-28`: capacity, fairness, backpressure, degradation, and load objectives pass.
          - `security-hardening-29`: authorization, tenant isolation, supply chain, secrets, web security, prompt injection, and abuse controls pass.

          ## Evidence classes

          Each release records the immutable artifact, source commit, dependency lockfile, SBOM, provenance, migrations, contract changes, test results, performance report, security report, feature flags, canary metrics, owner, approval, rollback target, and customer-facing change record.

          ## No-paper-launch rule

          A feature cannot be marked production-ready because a document describes it. Readiness requires runtime evidence tied to a commit and environment. Failed or waived gates remain visible and expire automatically.

          ## Operational acceptance

          Before general availability, operators must demonstrate restore, rollback, regional degradation, provider failover, secret rotation, connector revocation, publication withdrawal, billing reconciliation, and high-severity incident response.
          EOF

          mkdir -p docs/02-architecture/adr
          cat > docs/02-architecture/adr/0028-release-artifacts-and-contract-evolution.md <<'EOF'
          # ADR-0028: Promote immutable artifacts and evolve contracts compatibly

          Status: Accepted

          Research builds once, verifies the artifact, and promotes that same artifact through environments. Database, API, event, workflow, document, evidence-locator, index, export, and SDK changes use explicit compatibility windows and reversible migration stages.

          Rebuilding for production or deploying destructive contract changes in one step is prohibited.
          EOF

          cat > docs/02-architecture/adr/0029-secure-supply-chain-and-web-baseline.md <<'EOF'
          # ADR-0029: Treat supply-chain and web security as release gates

          Status: Accepted

          Dependencies and Actions are pinned, reviewed, scanned, and represented in release evidence. The web application implements tenant-safe authorization, CSRF and CORS controls, CSP, secure cookies, upload isolation, SSRF defenses, cache partitioning, webhook verification, and administrative step-up controls.

          Security tests are required evidence, not advisory reports.
          EOF

          cat > docs/02-architecture/adr/0030-capacity-keys-and-configuration-integrity.md <<'EOF'
          # ADR-0030: Make capacity, cryptographic keys, and configuration explicit domains

          Status: Accepted

          Research uses service classes, budgets, admission control, backpressure, and graceful degradation to protect interactive work from background workloads. Secrets and encryption keys have owners, versions, rotation, revocation, and audit trails. Configuration is typed, validated, environment-scoped, and fail-closed.
          EOF

      - name: Write machine-readable implementation control plane
