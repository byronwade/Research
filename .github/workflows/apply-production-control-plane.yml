          cat > docs/_meta/product-readiness-gaps.json <<'EOF'
          {
            "version": 1,
            "gaps": [
              {"id":"PR-01","title":"End-to-end product conformance","blocking":true,"ownerSlice":"conformance-26","status":"open"},
              {"id":"PR-02","title":"Schema and contract migration evidence","blocking":true,"ownerSlice":"evolution-27","status":"open"},
              {"id":"PR-03","title":"Capacity, fairness, and degraded-mode evidence","blocking":true,"ownerSlice":"performance-28","status":"open"},
              {"id":"PR-04","title":"Supply-chain provenance and policy","blocking":true,"ownerSlice":"security-hardening-29","status":"open"},
              {"id":"PR-05","title":"Secret and key lifecycle drills","blocking":true,"ownerSlice":"security-hardening-29","status":"open"},
              {"id":"PR-06","title":"Tenant, web, prompt-injection, and abuse security","blocking":true,"ownerSlice":"security-hardening-29","status":"open"},
              {"id":"PR-07","title":"Build-once promotion and rollback","blocking":true,"ownerSlice":"release-30","status":"open"},
              {"id":"PR-08","title":"Restore and business-continuity exercise","blocking":true,"ownerSlice":"release-30","status":"open"},
              {"id":"PR-09","title":"Operational ownership and support readiness","blocking":true,"ownerSlice":"release-30","status":"open"},
              {"id":"PR-10","title":"Launch evidence and customer communication","blocking":true,"ownerSlice":"release-30","status":"open"}
            ]
          }
          EOF

      - name: Write deterministic agent and validation scripts
        shell: bash
        run: |
          set -euo pipefail

          cat > scripts/agent-status.mjs <<'EOF'
          import fs from 'node:fs';
          const read = p => JSON.parse(fs.readFileSync(p, 'utf8'));
          const plan = read('docs/_meta/implementation-build-plan.json');
          const status = read('docs/_meta/implementation-status.json');
          const byId = new Map(plan.slices.map(s => [s.id, s]));
          const completed = new Set(status.completedSlices);
          const eligible = plan.slices
            .filter(s => !completed.has(s.id) && s.dependencies.every(d => completed.has(d)))
            .sort((a,b) => a.order-b.order);
          const next = eligible[0];
          if (!next) throw new Error('No eligible slice exists. Check dependency and status state.');
          if (status.nextSlice !== next.id) throw new Error(`Status nextSlice ${status.nextSlice} does not match eligible ${next.id}.`);
          console.log(`Repository state: ${status.repositoryState}`);
          console.log(`Runtime state: ${status.runtimeState}`);
          console.log(`Completed slices: ${completed.size}/${plan.slices.length}`);
          console.log(`Next slice: ${next.id} — ${next.title}`);
          console.log(`Dependencies: ${next.dependencies.length ? next.dependencies.join(', ') : 'none'}`);
          console.log(`Deliverable: ${next.deliverable}`);
          EOF

          cat > scripts/agent-context.mjs <<'EOF'
          import fs from 'node:fs';
          const read = p => JSON.parse(fs.readFileSync(p, 'utf8'));
          const plan = read('docs/_meta/implementation-build-plan.json');
          const status = read('docs/_meta/implementation-status.json');
          const requirements = read('docs/_meta/requirements.json').requirements;
          const routing = read('docs/_meta/agent-routing.json');
          const arg = process.argv.find(a => a.startsWith('--slice='));
          const id = arg ? arg.slice(8) : status.nextSlice;
          const slice = plan.slices.find(s => s.id === id);
          if (!slice) throw new Error(`Unknown slice: ${id}`);
          const completed = new Set(status.completedSlices);
          const eligible = slice.dependencies.every(d => completed.has(d));
          const owned = requirements.filter(r => r.ownerSlice === id);
          const docs = new Set([...routing.alwaysRead, ...slice.documents]);
          for (const prefix of slice.requirementPrefixes) for (const p of routing.prefixRoutes[prefix] ?? []) docs.add(p);
          console.log(`# ${slice.id}: ${slice.title}`);
          console.log(`Eligibility: ${eligible ? 'ready' : 'context-only; dependencies incomplete'}`);
          console.log(`Dependencies: ${slice.dependencies.length ? slice.dependencies.join(', ') : 'none'}`);
          console.log(`Deliverable: ${slice.deliverable}`);
          console.log('\n## Required reading');
          for (const p of docs) {
            if (!fs.existsSync(p)) throw new Error(`Routed document does not exist: ${p}`);
            console.log(`- ${p}`);
          }
          console.log('\n## Owned requirements');
          for (const r of owned) console.log(`- ${r.id}: ${r.statement}\n  Acceptance: ${r.acceptance}`);
          EOF

          cat > scripts/validate-agent-control.mjs <<'EOF'
          import fs from 'node:fs';
          const read = p => JSON.parse(fs.readFileSync(p, 'utf8'));
          const plan = read('docs/_meta/implementation-build-plan.json');
          const status = read('docs/_meta/implementation-status.json');
          const requirements = read('docs/_meta/requirements.json').requirements;
          const routing = read('docs/_meta/agent-routing.json');
          const ids = new Set(); const orders = new Set(); const byId = new Map();
          for (const s of plan.slices) {
            if (ids.has(s.id)) throw new Error(`Duplicate slice ${s.id}`);
            if (orders.has(s.order)) throw new Error(`Duplicate order ${s.order}`);
            ids.add(s.id); orders.add(s.order); byId.set(s.id,s);
          }
          for (const s of plan.slices) for (const d of s.dependencies) if (!byId.has(d)) throw new Error(`${s.id} depends on unknown ${d}`);
          const visiting = new Set(); const visited = new Set();
          function visit(id) { if (visiting.has(id)) throw new Error(`Dependency cycle at ${id}`); if (visited.has(id)) return; visiting.add(id); for (const d of byId.get(id).dependencies) visit(d); visiting.delete(id); visited.add(id); }
          for (const id of ids) visit(id);
          const reqIds = new Set();
          for (const r of requirements) {
            if (reqIds.has(r.id)) throw new Error(`Duplicate requirement ${r.id}`);
            if (!byId.has(r.ownerSlice)) throw new Error(`${r.id} has unknown owner ${r.ownerSlice}`);
            const prefix = r.id.split('-')[0];
            if (!routing.prefixRoutes[prefix]) throw new Error(`${r.id} has no routing prefix`);
            reqIds.add(r.id);
          }
          for (const s of plan.slices) {
            const owned = requirements.filter(r => r.ownerSlice === s.id);
            if (!owned.length) throw new Error(`${s.id} owns no requirements`);
            for (const p of s.documents) if (!fs.existsSync(p)) throw new Error(`${s.id} routes missing ${p}`);
          }
          for (const p of routing.alwaysRead) if (!fs.existsSync(p)) throw new Error(`Missing always-read ${p}`);
          const completed = new Set(status.completedSlices);
          for (const id of completed) if (!byId.has(id)) throw new Error(`Unknown completed slice ${id}`);
          const eligible = plan.slices.filter(s => !completed.has(s.id) && s.dependencies.every(d => completed.has(d))).sort((a,b)=>a.order-b.order);
          if (!eligible.length) throw new Error('No eligible next slice');
          if (status.nextSlice !== eligible[0].id) throw new Error(`nextSlice must be ${eligible[0].id}`);
          console.log(`Agent control valid: ${plan.slices.length} slices, ${requirements.length} requirements.`);
          EOF

          cat > scripts/validate-production-readiness.mjs <<'EOF'
          import fs from 'node:fs';
          const plan = JSON.parse(fs.readFileSync('docs/_meta/implementation-build-plan.json','utf8'));
          const gaps = JSON.parse(fs.readFileSync('docs/_meta/product-readiness-gaps.json','utf8')).gaps;
          const byId = new Map(plan.slices.map(s => [s.id,s]));
          const release = byId.get('release-30');
          if (!release) throw new Error('release-30 is missing');
          const required = ['conformance-26','evolution-27','performance-28','security-hardening-29'];
          const ancestors = new Set();
          function walk(id) { for (const d of byId.get(id).dependencies) if (!ancestors.has(d)) { ancestors.add(d); walk(d); } }
          walk(release.id);
          for (const id of required) if (!ancestors.has(id)) throw new Error(`release-30 does not transitively depend on ${id}`);
          for (const gap of gaps) {
            if (!byId.has(gap.ownerSlice)) throw new Error(`Gap ${gap.id} has unknown owner`);
            if (gap.blocking && !ancestors.has(gap.ownerSlice) && gap.ownerSlice !== release.id) throw new Error(`Blocking gap ${gap.id} is outside release dependency graph`);
          }
          if (gaps.filter(g => g.blocking).length < 8) throw new Error('Insufficient explicit launch blockers');
          console.log(`Production readiness valid: ${gaps.length} gaps, ${gaps.filter(g=>g.blocking).length} blocking.`);
          EOF

          cat > scripts/validate-workflow-security.mjs <<'EOF'
          import fs from 'node:fs';
          import path from 'node:path';
          const dir = '.github/workflows';
          const files = fs.existsSync(dir) ? fs.readdirSync(dir).filter(f => /\.ya?ml$/.test(f)) : [];
          if (files.length !== 1 || files[0] !== 'docs.yml') throw new Error(`Expected only .github/workflows/docs.yml; found ${files.join(', ')}`);
          const text = fs.readFileSync(path.join(dir, files[0]), 'utf8');
          if (/pull_request_target\s*:/.test(text)) throw new Error('pull_request_target is prohibited');
          const mutable = [...text.matchAll(/uses:\s*([^\s#]+)@([^\s#]+)/g)].filter(m => !m[1].startsWith('./') && !/^[0-9a-f]{40}$/.test(m[2]));
          if (mutable.length) throw new Error(`Unpinned Actions: ${mutable.map(m=>m[0]).join(', ')}`);
          if (!/permissions:\s*\n\s+contents:\s*read/.test(text)) throw new Error('Workflow must default to contents: read');
          if (!/persist-credentials:\s*false/.test(text)) throw new Error('Checkout must disable persistent credentials');
          console.log('Workflow security valid.');
          EOF

          cat > scripts/validate-links.mjs <<'EOF'
          import fs from 'node:fs';
          import path from 'node:path';
          function walk(dir) { return fs.readdirSync(dir,{withFileTypes:true}).flatMap(e => e.name === '.git' ? [] : e.isDirectory() ? walk(path.join(dir,e.name)) : [path.join(dir,e.name)]); }
          const files = walk('.').filter(f => f.endsWith('.md'));
          const errors = [];
          for (const file of files) {
            const text = fs.readFileSync(file,'utf8');
            for (const m of text.matchAll(/\[[^\]]*\]\(([^)]+)\)/g)) {
              let target = m[1].trim().split('#')[0];
              if (!target || /^(https?:|mailto:|data:)/.test(target)) continue;
              target = decodeURIComponent(target);
              const resolved = path.resolve(path.dirname(file),target);
              if (!fs.existsSync(resolved)) errors.push(`${file} -> ${m[1]}`);
            }
          }
          if (errors.length) throw new Error(`Broken relative links:\n${errors.join('\n')}`);
          console.log(`Relative links valid across ${files.length} Markdown files.`);
          EOF

          cat > scripts/validate-repository.mjs <<'EOF'
          import fs from 'node:fs';
          import { spawnSync } from 'node:child_process';
          const required = ['README.md','AGENTS.md','PRODUCT.md','ARCHITECTURE.md','ROADMAP.md','SECURITY.md','docs/START-HERE.md','docs/README.md','docs/_meta/agent-routing.json','docs/_meta/implementation-build-plan.json','docs/_meta/implementation-status.json','docs/_meta/requirements.json','docs/_meta/product-readiness-gaps.json','scripts/agent-status.mjs','scripts/agent-context.mjs'];
          for (const p of required) if (!fs.existsSync(p)) throw new Error(`Missing required file ${p}`);
          for (const p of ['docs/_meta/agent-routing.json','docs/_meta/implementation-build-plan.json','docs/_meta/implementation-status.json','docs/_meta/requirements.json','docs/_meta/product-readiness-gaps.json','docs/_meta/document-governance.json']) JSON.parse(fs.readFileSync(p,'utf8'));
          const scripts = ['scripts/validate-agent-control.mjs','scripts/validate-production-readiness.mjs','scripts/validate-workflow-security.mjs','scripts/validate-links.mjs','scripts/agent-status.mjs','scripts/agent-context.mjs'];
          for (const script of scripts) {
            const r = spawnSync(process.execPath,[script],{stdio:'inherit'});
            if (r.status !== 0) process.exit(r.status ?? 1);
          }
          console.log('Repository control plane valid.');
          EOF

          cat > package.json <<'EOF'
          {
            "name": "research",
            "private": true,
            "version": "0.0.0",
            "description": "Source-native research and living documentation platform",
            "engines": {"node": ">=24"},
            "scripts": {
              "agent:status": "node scripts/agent-status.mjs",
              "agent:context": "node scripts/agent-context.mjs",
              "agent:check": "node scripts/validate-repository.mjs"
            }
          }
          EOF

      - name: Clean publication remnants and install canonical workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap .canonical-import-v6 .canonical-v6-final .canonical-v6-payload .canonical-v7 .research-import research-import .publication .v7-delta .v7-patch
          rm -f MATERIALIZATION_DIAGNOSTIC.md PROJECT_STATUS.md DIRECT_PUBLICATION_STATUS.md TREE_API_TEST.txt TREE_TEST_2.md _tool_probe.txt _probe_should_not_create.txt _probe2.txt
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cat > .github/workflows/docs.yml <<'EOF'
          name: Documentation contracts

          on:
            pull_request:
            push:
              branches: [main]

          permissions:
            contents: read

          jobs:
            validate:
              runs-on: ubuntu-latest
              timeout-minutes: 10
              steps:
                - name: Check out repository
                  uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
                  with:
                    persist-credentials: false
                - name: Validate documentation and agent contracts
                  run: npm run agent:check
          EOF

      - name: Validate final repository state
        shell: bash
        run: |
          set -euo pipefail
          npm run agent:check
          git diff --check
          test "$(find .github/workflows -maxdepth 1 -type f | wc -l | tr -d ' ')" = 1
          test -f .github/workflows/docs.yml
          ! find . -maxdepth 2 -type d \( -name '.bootstrap' -o -name '.canonical*' -o -name '.research-import' -o -name '.v7-*' \) | grep -q .

      - name: Commit production-ready documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Research documentation publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: finalize production-ready Research control plane'
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin main

      - name: Close trigger pull request
        if: success()
        shell: bash
        run: gh pr close "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --comment 'The production-ready documentation control plane was validated and committed directly to main.'
