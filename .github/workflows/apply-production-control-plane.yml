              "EVID":["docs/03-ai/claims-evidence-citations.md"],
              "DOC":["docs/01-product/documents-and-canvas.md","docs/02-architecture/canonical-content-and-no-drift.md"],
              "RES":["docs/03-ai/research-orchestrator.md"],
              "ENG":["docs/03-ai/research-orchestrator.md"],
              "AGENT":["docs/03-ai/multi-agent-orchestration.md"],
