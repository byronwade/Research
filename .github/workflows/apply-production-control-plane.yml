              {"id":"EVO-001","ownerSlice":"evolution-27","statement":"Persistent changes use expand, backfill, verify, switch, observe, and contract stages.","acceptance":"Mixed-version and rollback tests pass with in-flight workflows."},
              {"id":"EVO-002","ownerSlice":"evolution-27","statement":"APIs, events, indexes, exports, and SDKs have explicit compatibility and deprecation policies.","acceptance":"Old and new supported consumers pass contract fixtures during the window."},
