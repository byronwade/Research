              "API":["docs/02-architecture/developer-platform-api.md"],
              "COMM":["docs/06-delivery/production-readiness-control-plane.md"],
              "OPS":["docs/06-delivery/production-readiness-control-plane.md"],
              "GOV":["docs/05-security/data-governance.md"],
              "QA":["docs/06-delivery/production-readiness-control-plane.md"],
              "EVO":["docs/02-architecture/schema-contract-and-data-evolution.md"],
              "PERF":["docs/06-delivery/performance-capacity-and-load-engineering.md"],
              "SSC":["docs/05-security/secure-software-supply-chain.md"],
              "KEY":["docs/05-security/secrets-encryption-and-configuration.md"],
              "APPSEC":["docs/05-security/web-application-security-baseline.md","docs/05-security/threat-model.md"],
