name: Publish canonical Research repository

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/import-v6.yml"
      - ".research-import/**"
      - "research-import/**"
      - "**/*.part*"
      - "**/*segment*"
      - "**/*chunk*"

permissions:
  contents: write

concurrency:
  group: canonical-repository-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out staging branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and publish canonical repository
        shell: bash
        run: |
          set -euo pipefail

          workspace="$PWD"
          candidate_list="/tmp/research-import-candidates.txt"
          payload="/tmp/research-v6.payload"
          source_dir="/tmp/research-v6-source"

          find . -type f \
            -not -path './.git/*' \
            -not -path './.github/workflows/import-v6.yml' \
            -not -path './README.md' \
            -size +10000c \
            -print | LC_ALL=C sort > "$candidate_list"

          if [[ ! -s "$candidate_list" ]]; then
            echo "No staged import segments were found." >&2
            find . -maxdepth 4 -type f -not -path './.git/*' -printf '%s %p\n' | sort -nr >&2
            exit 1
          fi

          echo "Import candidates:"
          while IFS= read -r file; do
            printf '%12s  %s\n' "$(wc -c < "$file")" "$file"
          done < "$candidate_list"

          python3 - "$candidate_list" "$payload" <<'PY'
          import base64
          import binascii
          import json
          import pathlib
          import re
          import sys
          import tarfile
          import zipfile

          candidate_file = pathlib.Path(sys.argv[1])
          output = pathlib.Path(sys.argv[2])
          paths = [pathlib.Path(line.strip()) for line in candidate_file.read_text().splitlines() if line.strip()]
          chunks = [path.read_bytes() for path in paths]

          def is_payload(data: bytes) -> bool:
              if data.startswith(b"# v2 git bundle") or data.startswith(b"# v3 git bundle"):
                  return True
              probe = pathlib.Path('/tmp/research-payload-probe')
              probe.write_bytes(data)
              try:
                  if zipfile.is_zipfile(probe):
                      return True
                  if tarfile.is_tarfile(probe):
                      return True
              finally:
                  probe.unlink(missing_ok=True)
              return False

          variants: list[bytes] = []
          variants.append(b''.join(chunks))
          variants.append(b'\n'.join(chunks))

          json_parts = []
          for chunk in chunks:
              try:
                  value = json.loads(chunk.decode('utf-8'))
              except Exception:
                  continue
              if isinstance(value, str):
                  json_parts.append(value.encode())
              elif isinstance(value, dict):
                  for key in ('content', 'data', 'payload', 'chunk', 'segment'):
                      if isinstance(value.get(key), str):
                          json_parts.append(value[key].encode())
                          break
          if json_parts:
              variants.extend((b''.join(json_parts), b'\n'.join(json_parts)))

          extracted_parts = []
          for chunk in chunks:
              text = chunk.decode('ascii', errors='ignore')
              text = re.sub(r'^data:[^,]+,', '', text.strip())
              runs = re.findall(r'[A-Za-z0-9+/=_-]{1000,}', text)
              if runs:
                  extracted_parts.append(max(runs, key=len).encode())
          if extracted_parts:
              variants.extend((b''.join(extracted_parts), b'\n'.join(extracted_parts)))

          attempted = set()
          for raw in variants:
              if not raw:
                  continue
              transforms = [('raw', raw)]
              compact = re.sub(rb'\s+', b'', raw)
              transforms.append(('compact-base64', compact))
              for name, value in list(transforms):
                  candidates = [(name, value)]
                  if name != 'raw':
                      for decoder_name, decoder in (
                          ('base64', base64.b64decode),
                          ('urlsafe-base64', base64.urlsafe_b64decode),
                      ):
                          padded = value + b'=' * ((4 - len(value) % 4) % 4)
                          try:
                              candidates.append((decoder_name, decoder(padded)))
                          except (ValueError, binascii.Error):
                              pass
                      try:
                          candidates.append(('hex', bytes.fromhex(value.decode('ascii'))))
                      except Exception:
                          pass
                  for transform_name, data in candidates:
                      fingerprint = (len(data), data[:64], data[-64:])
                      if fingerprint in attempted:
                          continue
                      attempted.add(fingerprint)
                      if is_payload(data):
                          output.write_bytes(data)
                          print(f"Recovered payload with {transform_name}: {len(data)} bytes")
                          raise SystemExit(0)

          raise SystemExit('Unable to reconstruct a ZIP, tar archive, or Git bundle from staged segments.')
          PY

          rm -rf "$source_dir"

          if head -c 32 "$payload" | grep -q '^# v[23] git bundle'; then
            echo "Detected Git bundle; preserving complete repository history."
            git clone "$payload" "$source_dir"
            cd "$source_dir"
            git checkout main
          else
            echo "Detected source archive; creating a clean canonical root commit."
            mkdir -p "$source_dir"
            if unzip -tq "$payload" >/dev/null 2>&1; then
              unzip -q "$payload" -d "$source_dir"
            else
              tar -xf "$payload" -C "$source_dir"
            fi

            mapfile -t entries < <(find "$source_dir" -mindepth 1 -maxdepth 1 -print)
            if [[ ${#entries[@]} -eq 1 && -d "${entries[0]}" ]]; then
              source_dir="${entries[0]}"
            fi

            rm -rf "$source_dir/.git"
            cd "$source_dir"
            git init -b main
            git config user.name "Research repository importer"
            git config user.email "actions@users.noreply.github.com"
            git add -A
            git commit -m "docs: publish complete Research specification"
          fi

          for required in \
            README.md \
            AGENTS.md \
            docs/START-HERE.md \
            docs/README.md \
            docs/_meta/agent-routing.json \
            docs/_meta/implementation-build-plan.json \
            docs/_meta/requirements.json \
            package.json; do
            if [[ ! -f "$required" ]]; then
              echo "Required canonical file is missing: $required" >&2
              exit 1
            fi
          done

          tracked_count="$(git ls-files | wc -l | tr -d ' ')"
          echo "Canonical tracked files: $tracked_count"
          if [[ "$tracked_count" -lt 200 ]]; then
            echo "Expected at least 200 tracked files; refusing partial import." >&2
            exit 1
          fi

          node scripts/agent-status.mjs
          node scripts/agent-context.mjs > /tmp/agent-context.txt

          if command -v corepack >/dev/null 2>&1; then
            corepack enable
            if command -v pnpm >/dev/null 2>&1; then
              pnpm agent:check
            fi
          fi

          git status --short
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin main:main

          echo "Canonical Research repository published to main at $(git rev-parse HEAD)."
