name: Finalize complete Research V6 repository

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: finalize-research-v6
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event.pull_request.title == '[system] finalize Research V6'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Wait for and verify canonical publication
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            git fetch origin main
            git reset --hard origin/main
            if [[ -f PRODUCT.md && -f ARCHITECTURE.md && -f ROADMAP.md && -f AGENTS.md && -f docs/START-HERE.md && -f docs/_meta/requirements.json && -f scripts/agent-context.mjs ]]; then
              markdown_count="$(find docs -type f -name '*.md' | wc -l | tr -d ' ')"
              if [[ "$markdown_count" -ge 134 ]]; then
                echo "Canonical publication detected with $markdown_count documentation files."
                exit 0
              fi
            fi
            echo "Canonical publication not complete yet; attempt $attempt/30."
            sleep 10
          done
          echo 'Canonical Research V6 publication did not appear on main within five minutes.' >&2
          exit 1

      - name: Remove one-time import machinery and install permanent documentation CI
        shell: bash
        run: |
          set -euo pipefail

          rm -rf \
            .bootstrap \
            .canonical-import-v6 \
            .canonical-v6-final \
            .research-import \
            research-import

          rm -f \
            MATERIALIZATION_DIAGNOSTIC.md \
            .github/workflows/import-v6.yml \
            .github/workflows/import-v6-final.yml \
            .github/workflows/publish-canonical-v6-bore.yml \
            .github/workflows/materialize-canonical-v6.yml \
            .github/workflows/materialize-research-v6.yml \
            .github/workflows/finalize-publication.yml \
            .github/workflows/publish-canonical-v6-from-tunnel.yml \
            .github/workflows/cleanup-failed-importers.yml \
            .github/workflows/publish-existing-canonical-v6.yml \
            .github/workflows/finalize-research-v6.yml

          mkdir -p .github/workflows
          cat > .github/workflows/docs.yml <<'YAML'
          name: Documentation contracts

          on:
            pull_request:
            push:
              branches: [main]

          permissions:
            contents: read

          jobs:
            validate:
              runs-on: ubuntu-latest
              timeout-minutes: 15
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 24
                    cache: pnpm
                - name: Enable Corepack
                  run: corepack enable
                - name: Install dependencies
                  run: pnpm install --frozen-lockfile
                - name: Validate repository contracts
                  run: pnpm agent:check
                - name: Ensure generated documentation state is committed
                  run: git diff --exit-code
          YAML

          node scripts/agent-status.mjs
          node scripts/agent-context.mjs > /tmp/research-agent-context.txt
          node scripts/validate-docs.mjs
          node scripts/validate-tooling-catalog.mjs
          node scripts/validate-notebooklm-catalog.mjs
          node scripts/validate-agent-contract.mjs
          node scripts/validate-doc-cohesion.mjs
          node scripts/validate-product-readiness.mjs

          git config user.name 'Research repository finalizer'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --check
          if ! git diff --cached --quiet; then
            git commit -m 'chore: finalize canonical Research repository'
            git push origin main
          fi

      - name: Close finalization pull request
        if: success()
        shell: bash
        run: gh pr close "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --comment 'The canonical Research V6 documentation is published, validated, and stripped of one-time import machinery.'
