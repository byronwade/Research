name: Publish canonical Research repository (final)

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/import-v6-final.yml"
      - ".research-import/**"
      - "research-import/**"
      - "**/*.part*"
      - "**/*segment*"
      - "**/*chunk*"

permissions:
  contents: write

concurrency:
  group: canonical-repository-import-final
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out staged import
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Recover staged V6 payload
        id: recover
        shell: bash
        run: |
          set -euo pipefail
          candidate_list=/tmp/research-import-candidates.txt
          payload=/tmp/research-v6.payload

          find . -type f \
            -not -path './.git/*' \
            -not -path './.github/workflows/*' \
            -not -path './README.md' \
            -size +10000c \
            -print | LC_ALL=C sort > "$candidate_list"

          if [[ ! -s "$candidate_list" ]]; then
            echo 'No staged archive segments were found.' >&2
            find . -maxdepth 5 -type f -not -path './.git/*' -printf '%12s %p\n' | sort -nr >&2
            exit 1
          fi

          echo 'Staged archive candidates:'
          while IFS= read -r file; do
            printf '%12s %s\n' "$(wc -c < "$file")" "$file"
          done < "$candidate_list"

          python3 - "$candidate_list" "$payload" <<'PY'
          import base64
          import binascii
          import json
          import pathlib
          import re
          import sys
          import tarfile
          import zipfile

          paths = [pathlib.Path(v) for v in pathlib.Path(sys.argv[1]).read_text().splitlines() if v]
          output = pathlib.Path(sys.argv[2])
          chunks = [p.read_bytes() for p in paths]

          def valid(data: bytes) -> bool:
              if data.startswith((b'# v2 git bundle', b'# v3 git bundle')):
                  return True
              probe = pathlib.Path('/tmp/research-import-probe')
              probe.write_bytes(data)
              try:
                  return zipfile.is_zipfile(probe) or tarfile.is_tarfile(probe)
              finally:
                  probe.unlink(missing_ok=True)

          forms = [b''.join(chunks), b'\n'.join(chunks)]

          json_chunks = []
          extracted_chunks = []
          for chunk in chunks:
              try:
                  value = json.loads(chunk.decode('utf-8'))
                  if isinstance(value, str):
                      json_chunks.append(value.encode())
                  elif isinstance(value, dict):
                      for key in ('content', 'data', 'payload', 'chunk', 'segment'):
                          item = value.get(key)
                          if isinstance(item, str):
                              json_chunks.append(item.encode())
                              break
              except Exception:
                  pass

              text = chunk.decode('ascii', errors='ignore').strip()
              text = re.sub(r'^data:[^,]+,', '', text)
              runs = re.findall(r'[A-Za-z0-9+/=_-]{1000,}', text)
              if runs:
                  extracted_chunks.append(max(runs, key=len).encode())

          if json_chunks:
              forms.extend((b''.join(json_chunks), b'\n'.join(json_chunks)))
          if extracted_chunks:
              forms.extend((b''.join(extracted_chunks), b'\n'.join(extracted_chunks)))

          seen = set()
          for form in forms:
              compact = re.sub(rb'\s+', b'', form)
              attempts = [('raw', form), ('compact', compact)]
              padded = compact + b'=' * ((4 - len(compact) % 4) % 4)
              for label, decoder in (
                  ('base64', base64.b64decode),
                  ('urlsafe-base64', base64.urlsafe_b64decode),
              ):
                  try:
                      attempts.append((label, decoder(padded)))
                  except (ValueError, binascii.Error):
                      pass
              try:
                  attempts.append(('hex', bytes.fromhex(compact.decode('ascii'))))
              except Exception:
                  pass

              for label, data in attempts:
                  key = (len(data), data[:48], data[-48:])
                  if key in seen:
                      continue
                  seen.add(key)
                  if valid(data):
                      output.write_bytes(data)
                      print(f'Recovered {len(data)} bytes using {label}.')
                      raise SystemExit(0)

          raise SystemExit('Staged files did not reconstruct into a Git bundle, ZIP, or tar archive.')
          PY

          echo "payload=$payload" >> "$GITHUB_OUTPUT"

      - name: Materialize canonical source tree
        id: materialize
        shell: bash
        run: |
          set -euo pipefail
          payload='${{ steps.recover.outputs.payload }}'
          source_dir=/tmp/research-v6-source
          rm -rf "$source_dir"

          if head -c 32 "$payload" | grep -Eq '^# v[23] git bundle'; then
            git clone "$payload" "$source_dir"
            cd "$source_dir"
            git checkout main
            echo 'history=bundle' >> "$GITHUB_OUTPUT"
          else
            mkdir -p "$source_dir"
            if unzip -tq "$payload" >/dev/null 2>&1; then
              unzip -q "$payload" -d "$source_dir"
            else
              tar -xf "$payload" -C "$source_dir"
            fi

            mapfile -t roots < <(find "$source_dir" -mindepth 1 -maxdepth 1 -print)
            if [[ ${#roots[@]} -eq 1 && -d "${roots[0]}" ]]; then
              source_dir="${roots[0]}"
            fi

            rm -rf "$source_dir/.git"
            cd "$source_dir"
            git init -b main
            git config user.name 'Research repository importer'
            git config user.email 'actions@users.noreply.github.com'
            git add -A
            git commit -m 'docs: publish complete Research specification'
            echo 'history=snapshot' >> "$GITHUB_OUTPUT"
          fi

          echo "source_dir=$source_dir" >> "$GITHUB_OUTPUT"

      - name: Validate canonical repository contract
        shell: bash
        working-directory: ${{ steps.materialize.outputs.source_dir }}
        run: |
          set -euo pipefail

          required=(
            README.md
            AGENTS.md
            docs/START-HERE.md
            docs/README.md
            package.json
            scripts/agent-status.mjs
            scripts/agent-context.mjs
          )
          for path in "${required[@]}"; do
            [[ -f "$path" ]] || { echo "Missing canonical file: $path" >&2; exit 1; }
          done

          tracked_count="$(git ls-files | wc -l | tr -d ' ')"
          markdown_count="$(git ls-files '*.md' | wc -l | tr -d ' ')"
          echo "Tracked files: $tracked_count"
          echo "Markdown files: $markdown_count"
          [[ "$tracked_count" -ge 200 ]] || { echo 'Partial repository snapshot detected.' >&2; exit 1; }
          [[ "$markdown_count" -ge 120 ]] || { echo 'Documentation corpus is incomplete.' >&2; exit 1; }

          node scripts/agent-status.mjs
          node scripts/agent-context.mjs > /tmp/research-agent-context.txt

          if command -v corepack >/dev/null 2>&1; then
            corepack enable
            if command -v pnpm >/dev/null 2>&1; then
              pnpm agent:check
            fi
          fi

          git diff --check

      - name: Force-publish canonical main
        shell: bash
        working-directory: ${{ steps.materialize.outputs.source_dir }}
        run: |
          set -euo pipefail
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin main:main
          echo "Published main at $(git rev-parse HEAD)."
