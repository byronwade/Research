name: Apply implementation reference pack

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: apply-implementation-reference-pack
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.title == '[system] apply Research implementation reference pack'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Route implementation references
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const routingPath = 'docs/_meta/agent-routing.json';
          const planPath = 'docs/_meta/implementation-build-plan.json';
          const routing = JSON.parse(fs.readFileSync(routingPath,'utf8'));
          const plan = JSON.parse(fs.readFileSync(planPath,'utf8'));

          const routes = {
            FOUND:['docs/07-reference/database-schema-blueprint.md'],
            AUTH:['docs/02-architecture/tenancy-authorization-and-capabilities.md'],
            SRC:['docs/04-sources/source-capability-and-format-matrix.md'],
            ING:['docs/04-sources/source-capability-and-format-matrix.md'],
            RET:['docs/04-sources/web-acquisition-search-and-citation.md'],
            RES:['docs/02-architecture/durable-workflows-idempotency-and-outbox.md','docs/03-ai/model-routing-evaluation-and-cost-control.md','docs/04-sources/web-acquisition-search-and-citation.md'],
            ENG:['docs/03-ai/model-routing-evaluation-and-cost-control.md'],
            AGENT:['docs/02-architecture/durable-workflows-idempotency-and-outbox.md'],
            API:['docs/07-reference/api-error-operation-and-pagination-contract.md','docs/07-reference/event-webhook-and-idempotency-contract.md'],
            OPS:['docs/02-architecture/durable-workflows-idempotency-and-outbox.md','docs/06-delivery/runbook-catalog-and-operational-drills.md'],
            EVO:['docs/07-reference/database-schema-blueprint.md','docs/07-reference/api-error-operation-and-pagination-contract.md','docs/07-reference/event-webhook-and-idempotency-contract.md'],
            QA:['docs/06-delivery/launch-readiness-and-release-evidence.md'],
            REL:['docs/06-delivery/runbook-catalog-and-operational-drills.md','docs/06-delivery/launch-readiness-and-release-evidence.md']
          };
          for (const [prefix, docs] of Object.entries(routes)) {
            if (!routing.prefixRoutes[prefix]) throw new Error(`Unknown prefix ${prefix}`);
            routing.prefixRoutes[prefix] = [...new Set([...routing.prefixRoutes[prefix], ...docs])];
          }

          const byId = new Map(plan.slices.map(s => [s.id,s]));
          const sliceDocs = {
            'foundation-01':['docs/07-reference/database-schema-blueprint.md'],
            'identity-03':['docs/02-architecture/tenancy-authorization-and-capabilities.md'],
            'source-storage-05':['docs/04-sources/source-capability-and-format-matrix.md'],
            'parsing-06':['docs/04-sources/source-capability-and-format-matrix.md'],
            'retrieval-08':['docs/04-sources/web-acquisition-search-and-citation.md'],
            'research-runs-12':['docs/02-architecture/durable-workflows-idempotency-and-outbox.md','docs/03-ai/model-routing-evaluation-and-cost-control.md','docs/04-sources/web-acquisition-search-and-citation.md'],
            'research-engines-13':['docs/03-ai/model-routing-evaluation-and-cost-control.md'],
            'agents-14':['docs/02-architecture/durable-workflows-idempotency-and-outbox.md'],
            'platform-api-22':['docs/07-reference/api-error-operation-and-pagination-contract.md','docs/07-reference/event-webhook-and-idempotency-contract.md'],
            'operations-24':['docs/06-delivery/runbook-catalog-and-operational-drills.md'],
            'evolution-27':['docs/07-reference/database-schema-blueprint.md','docs/07-reference/api-error-operation-and-pagination-contract.md','docs/07-reference/event-webhook-and-idempotency-contract.md'],
            'conformance-26':['docs/06-delivery/launch-readiness-and-release-evidence.md'],
            'release-30':['docs/06-delivery/runbook-catalog-and-operational-drills.md','docs/06-delivery/launch-readiness-and-release-evidence.md']
          };
          for (const [id, docs] of Object.entries(sliceDocs)) {
            const slice = byId.get(id);
            if (!slice) throw new Error(`Missing slice ${id}`);
            slice.documents = [...new Set([...slice.documents, ...docs])];
          }

          fs.writeFileSync(routingPath, JSON.stringify(routing,null,2)+'\n');
          fs.writeFileSync(planPath, JSON.stringify(plan,null,2)+'\n');
          NODE

      - name: Reconcile navigation
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          function appendOnce(path, marker, section) {
            let text = fs.readFileSync(path,'utf8');
            if (!text.includes(marker)) text = text.trimEnd() + '\n\n' + section.trim() + '\n';
            fs.writeFileSync(path,text);
          }
          appendOnce('docs/README.md','## Implementation reference pack',`
          ## Implementation reference pack

          - [Tenancy, authorization, and capabilities](02-architecture/tenancy-authorization-and-capabilities.md)
          - [Durable workflows, idempotency, and outbox](02-architecture/durable-workflows-idempotency-and-outbox.md)
          - [Model routing, evaluation, and cost control](03-ai/model-routing-evaluation-and-cost-control.md)
          - [Source capability and format matrix](04-sources/source-capability-and-format-matrix.md)
          - [Web acquisition, search, and citation](04-sources/web-acquisition-search-and-citation.md)
          - [API errors, Operations, concurrency, and pagination](07-reference/api-error-operation-and-pagination-contract.md)
          - [Events, webhooks, and delivery idempotency](07-reference/event-webhook-and-idempotency-contract.md)
          - [Database schema blueprint](07-reference/database-schema-blueprint.md)
          - [Runbook catalog and operational drills](06-delivery/runbook-catalog-and-operational-drills.md)
          - [Launch readiness and release evidence](06-delivery/launch-readiness-and-release-evidence.md)
          `);
          appendOnce('docs/START-HERE.md','## Implementation contracts',`
          ## Implementation contracts

          When a slice touches authorization, durable work, models, source formats, web acquisition, public API, events, persistence, operations, or release, `agent-context` includes the corresponding implementation reference. Do not invent a local alternative when a routed contract already governs the behavior.
          `);
          appendOnce('REPOSITORY_GUIDE.md','## Implementation references',`
          ## Implementation references

          Detailed implementation contracts live in architecture, AI, source, delivery, and reference directories and are selected by `docs/_meta/agent-routing.json`. A document added outside that graph is incomplete repository work.
          `);
          appendOnce('ARCHITECTURE.md','## Detailed implementation references',`
          ## Detailed implementation references

          Authorization, workflow durability, model routing, source capability, web acquisition, API behavior, event delivery, schema layout, operational drills, and release evidence have dedicated routed contracts in `docs/02-architecture`, `docs/03-ai`, `docs/04-sources`, `docs/06-delivery`, and `docs/07-reference`.
          `);
          NODE

      - name: Restore permanent workflow and validate
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cat > .github/workflows/docs.yml <<'EOF'
          name: Documentation contracts

          on:
            pull_request:
            push:
              branches: [main]

          permissions:
            contents: read

          jobs:
            validate:
              runs-on: ubuntu-latest
              timeout-minutes: 10
              steps:
                - name: Check out repository
                  uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
                  with:
                    persist-credentials: false
                - name: Validate documentation and agent contracts
                  run: npm run agent:check
          EOF
          npm run agent:check
          git diff --check

      - name: Commit implementation reference cohesion
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Research documentation publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: integrate implementation reference pack'
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin main

      - name: Close trigger pull request
        if: success()
        shell: bash
        run: gh pr close "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --comment 'The implementation reference pack is integrated into agent routing and the 30-slice build plan.'
