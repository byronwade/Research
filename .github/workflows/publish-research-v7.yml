name: Publish validated Research V7 delta

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: publish-research-v7
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.pull_request.title == '[system] publish validated Research V7 delta'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out delta payload
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reconstruct validated V7 delta
        id: delta
        shell: bash
        run: |
          set -euo pipefail
          parts=/tmp/research-v7-delta-parts.txt
          encoded=/tmp/research-v7-delta.tar.xz.b64
          archive=/tmp/research-v7-delta.tar.xz
          delta=/tmp/research-v7-delta

          find .v7-delta -maxdepth 1 -type f -name 'part-*' -print | LC_ALL=C sort > "$parts"
          count="$(wc -l < "$parts" | tr -d ' ')"
          [[ "$count" -eq 4 ]] || { echo "Expected 4 delta parts, found $count" >&2; exit 1; }

          while IFS= read -r path; do cat "$path"; done < "$parts" | tr -d '\r\n\t ' > "$encoded"
          encoded_bytes="$(wc -c < "$encoded" | tr -d ' ')"
          [[ "$encoded_bytes" -eq 144616 ]] || { echo "Expected 144616 encoded bytes, found $encoded_bytes" >&2; exit 1; }

          base64 --decode "$encoded" > "$archive"
          expected='922340b61f03c0d94a86b0b8cbab0e436fcafc5e43f942050dbdda1a31481f96'
          actual="$(sha256sum "$archive" | awk '{print $1}')"
          [[ "$actual" == "$expected" ]] || { echo "Delta checksum mismatch: $actual" >&2; exit 1; }
          xz -t "$archive"

          rm -rf "$delta"
          mkdir -p "$delta"
          tar -xJf "$archive" -C "$delta"
          delta_count="$(find "$delta" -type f | wc -l | tr -d ' ')"
          [[ "$delta_count" -eq 31 ]] || { echo "Expected 31 delta files, found $delta_count" >&2; exit 1; }
          echo "delta=$delta" >> "$GITHUB_OUTPUT"

      - name: Assemble and validate the complete V7 tree
        id: source
        shell: bash
        run: |
          set -euo pipefail
          delta='${{ steps.delta.outputs.delta }}'
          publish=/tmp/research-v7-publish
          validate=/tmp/research-v7-validate

          rm -rf "$publish" "$validate"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$publish"
          cd "$publish"
          git checkout main

          rm -rf \
            .bootstrap \
            .canonical-import-v6 \
            .canonical-v6-final \
            .canonical-v7 \
            .research-import \
            research-import \
            .publication
          rm -f MATERIALIZATION_DIAGNOSTIC.md PROJECT_STATUS.md TREE_API_TEST.txt TREE_TEST_2.md

          rsync -a --exclude '.github/workflows/' "$delta"/ "$publish"/

          mkdir -p "$validate"
          rsync -a --exclude '.git/' "$publish"/ "$validate"/
          rm -rf "$validate/.github/workflows"
          mkdir -p "$validate/.github/workflows"
          cp "$delta/.github/workflows/docs.yml" "$validate/.github/workflows/docs.yml"

          required=(
            README.md
            AGENTS.md
            PRODUCT.md
            ARCHITECTURE.md
            ROADMAP.md
            SECURITY.md
            docs/START-HERE.md
            docs/README.md
            docs/00-foundation/requirements.md
            docs/02-architecture/schema-contract-and-data-evolution.md
            docs/05-security/secure-software-supply-chain.md
            docs/05-security/secrets-encryption-and-configuration.md
            docs/05-security/web-application-security-baseline.md
            docs/06-delivery/release-engineering-and-change-control.md
            docs/06-delivery/performance-capacity-and-load-engineering.md
            docs/_meta/agent-routing.json
            docs/_meta/build-plan.json
            docs/_meta/implementation-status.json
            scripts/agent-status.mjs
            scripts/agent-context.mjs
            scripts/validate-workflow-security.mjs
            package.json
          )
          for path in "${required[@]}"; do
            [[ -f "$validate/$path" ]] || { echo "Missing canonical file: $path" >&2; exit 1; }
          done

          file_count="$(find "$validate" -type f | wc -l | tr -d ' ')"
          markdown_count="$(find "$validate" -type f -name '*.md' | wc -l | tr -d ' ')"
          [[ "$file_count" -eq 235 ]] || { echo "Expected 235 files, found $file_count" >&2; find "$validate" -type f | sort >&2; exit 1; }
          [[ "$markdown_count" -eq 204 ]] || { echo "Expected 204 Markdown files, found $markdown_count" >&2; exit 1; }

          cd "$validate"
          node scripts/agent-status.mjs
          node scripts/agent-context.mjs > /tmp/research-v7-agent-context.txt
          node scripts/validate-docs.mjs
          node scripts/validate-tooling-catalog.mjs
          node scripts/validate-notebooklm-catalog.mjs
          node scripts/validate-agent-contract.mjs
          node scripts/validate-doc-cohesion.mjs
          node scripts/validate-product-readiness.mjs
          node scripts/validate-workflow-security.mjs

          echo "publish=$publish" >> "$GITHUB_OUTPUT"

      - name: Publish canonical non-workflow tree to main
        shell: bash
        run: |
          set -euo pipefail
          publish='${{ steps.source.outputs.publish }}'
          cd "$publish"
          git config user.name 'Research repository publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: publish production-ready Research V7 specification'
          git push origin main

      - name: Close trigger pull request
        if: success()
        shell: bash
        run: gh pr close "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --comment 'The validated Research V7 documentation and control-plane delta has been published to main. The repository finalization step will now install the canonical workflow and remove one-time publisher files.'
