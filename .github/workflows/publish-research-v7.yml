name: Publish final validated Research V7 tree

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: publish-final-research-v7
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.pull_request.title == '[system] publish final Research V7'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out patch payload
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Reconstruct validated patch
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          parts=/tmp/research-v7-parts.txt
          encoded=/tmp/research-v7.patch.xz.b64
          archive=/tmp/research-v7.patch.xz
          patch_file=/tmp/research-v7.patch

          find .v7-final-patch -maxdepth 1 -type f -name 'part-*' -print | LC_ALL=C sort > "$parts"
          count="$(wc -l < "$parts" | tr -d ' ')"
          [[ "$count" -eq 20 ]] || { echo "Expected 20 patch parts, found $count" >&2; exit 1; }

          while IFS= read -r path; do cat "$path"; done < "$parts" | tr -d '\r\n\t ' > "$encoded"
          encoded_bytes="$(wc -c < "$encoded" | tr -d ' ')"
          [[ "$encoded_bytes" -eq 781360 ]] || { echo "Expected 781360 encoded bytes, found $encoded_bytes" >&2; exit 1; }

          base64 --decode "$encoded" > "$archive"
          expected='8fd159009f7af8452843082de056280338f76f2345730cc1f3a98a388b5a8424'
          actual="$(sha256sum "$archive" | awk '{print $1}')"
          [[ "$actual" == "$expected" ]] || { echo "Patch checksum mismatch: $actual" >&2; exit 1; }
          xz -t "$archive"
          xz --decompress --stdout "$archive" > "$patch_file"
          grep -q 'docs/00-foundation/requirements.md' "$patch_file"
          grep -q 'docs/06-delivery/release-engineering-and-change-control.md' "$patch_file"
          grep -q 'scripts/validate-workflow-security.mjs' "$patch_file"
          echo "patch_file=$patch_file" >> "$GITHUB_OUTPUT"

      - name: Apply patch and validate canonical tree
        id: source
        shell: bash
        run: |
          set -euo pipefail
          patch_file='${{ steps.patch.outputs.patch_file }}'
          publish=/tmp/research-v7-publish
          validate=/tmp/research-v7-validate
          canonical_workflow="$GITHUB_WORKSPACE/.v7-final-patch/docs.yml"

          rm -rf "$publish" "$validate"
          git clone --quiet "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$publish"
          cd "$publish"
          git checkout main
          git diff --quiet 6def81789085e33661e36727dc920616fb1e22aa HEAD -- . ':(exclude).github/workflows/**' || {
            echo "non-workflow main content changed after patch generation; refusing stale publication" >&2
            exit 1
          }

          git apply --index --binary --whitespace=error-all --exclude='.github/workflows/*' "$patch_file"

          # The running workflow must remain present until this job completes.
          # Workflow files are finalized through the connected GitHub integration
          # immediately after the validated non-workflow commit lands.
          git restore --staged --worktree .github/workflows

          mkdir -p "$validate"
          rsync -a --exclude '.git/' "$publish"/ "$validate"/
          rm -rf "$validate/.github/workflows"
          mkdir -p "$validate/.github/workflows"
          cp "$canonical_workflow" "$validate/.github/workflows/docs.yml"

          file_count="$(find "$validate" -type f | wc -l | tr -d ' ')"
          markdown_count="$(find "$validate" -type f -name '*.md' | wc -l | tr -d ' ')"
          [[ "$file_count" -eq 235 ]] || { echo "Expected 235 files, found $file_count" >&2; exit 1; }
          [[ "$markdown_count" -eq 204 ]] || { echo "Expected 204 Markdown files, found $markdown_count" >&2; exit 1; }

          cd "$validate"
          node scripts/agent-status.mjs
          node scripts/agent-context.mjs > /tmp/research-v7-agent-context.txt
          node scripts/validate-docs.mjs
          node scripts/validate-tooling-catalog.mjs
          node scripts/validate-notebooklm-catalog.mjs
          node scripts/validate-agent-contract.mjs
          node scripts/validate-doc-cohesion.mjs
          node scripts/validate-product-readiness.mjs
          node scripts/validate-workflow-security.mjs

          echo "publish=$publish" >> "$GITHUB_OUTPUT"

      - name: Publish validated non-workflow tree to main
        shell: bash
        run: |
          set -euo pipefail
          publish='${{ steps.source.outputs.publish }}'
          cd "$publish"
          git config user.name 'Research repository publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: publish production-ready Research V7 specification'
          git push origin main

      - name: Close trigger pull request
        if: success()
        shell: bash
        run: gh pr close "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --comment 'The validated production-ready Research V7 documentation tree has been published to main. Workflow cleanup is being finalized through the connected GitHub integration.'
