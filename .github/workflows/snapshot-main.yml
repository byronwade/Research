name: Snapshot Research main

on:
  pull_request:
    types: [opened]

permissions:
  contents: read

jobs:
  snapshot:
    if: github.event.pull_request.title == '[system] snapshot Research main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Create faithful source archive
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude='.git' -czf /tmp/research-main.tar.gz .
          sha256sum /tmp/research-main.tar.gz
          find . -type f -not -path './.git/*' | LC_ALL=C sort > /tmp/research-main-files.txt
          wc -l /tmp/research-main-files.txt

      - name: Upload source archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: research-main-snapshot
          path: /tmp/research-main.tar.gz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
