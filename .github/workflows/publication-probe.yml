name: Publication probe

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publication-probe.yml"
      - ".bootstrap/publication-probe.trigger"

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record successful execution
        shell: bash
        run: |
          set -euo pipefail
          printf '# Publication probe\n\nGitHub Actions executed successfully.\n' > ACTIONS_PROBE_RAN.md
          git config user.name 'Research publication probe'
          git config user.email 'actions@users.noreply.github.com'
          git add ACTIONS_PROBE_RAN.md
          git commit -m 'chore: record Actions publication probe'
          git push origin HEAD:main
