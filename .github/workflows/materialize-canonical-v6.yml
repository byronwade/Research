name: Materialize canonical Research V6

on:
  push:
    branches: [main]
    paths:
      - ".canonical-import-v6/READY"

permissions:
  contents: write

concurrency:
  group: materialize-canonical-research-v6
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out staged archive
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and validate archive
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          parts=/tmp/research-v6-parts.txt
          encoded=/tmp/research-v6.tar.xz.b64
          archive=/tmp/research-v6.tar.xz

          find .canonical-import-v6 -maxdepth 1 -type f -name 'part-*.b64' -print | LC_ALL=C sort > "$parts"
          count="$(wc -l < "$parts" | tr -d ' ')"
          [[ "$count" -eq 32 ]] || { echo "Expected 32 archive parts, found $count" >&2; exit 1; }

          while IFS= read -r path; do cat "$path"; done < "$parts" | tr -d '\r\n\t ' > "$encoded"
          base64 --decode "$encoded" > "$archive"

          expected='f0a879a204864cb44a4e05309c083bd53a538cf4c12c9a0bfc7de239389da2fc'
          actual="$(sha256sum "$archive" | awk '{print $1}')"
          [[ "$actual" == "$expected" ]] || { echo "Archive checksum mismatch: $actual" >&2; exit 1; }
          xz -t "$archive"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Extract and validate canonical source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          source=/tmp/research-v6-source
          rm -rf "$source"
          mkdir -p "$source"
          tar -xJf '${{ steps.archive.outputs.archive }}' -C "$source"

          required=(
            README.md
            AGENTS.md
            PRODUCT.md
            ARCHITECTURE.md
            docs/START-HERE.md
            docs/README.md
            docs/_meta/agent-routing.json
            docs/_meta/build-plan.json
            docs/_meta/implementation-status.json
            docs/_meta/tooling-catalog.json
            scripts/agent-status.mjs
            scripts/agent-context.mjs
            package.json
          )
          for path in "${required[@]}"; do
            [[ -f "$source/$path" ]] || { echo "Missing canonical file: $path" >&2; exit 1; }
          done

          file_count="$(find "$source" -type f | wc -l | tr -d ' ')"
          markdown_count="$(find "$source" -type f -name '*.md' | wc -l | tr -d ' ')"
          [[ "$file_count" -eq 225 ]] || { echo "Expected 225 files, found $file_count" >&2; exit 1; }
          [[ "$markdown_count" -eq 195 ]] || { echo "Expected 195 Markdown files, found $markdown_count" >&2; exit 1; }

          cd "$source"
          node scripts/agent-status.mjs
          node scripts/agent-context.mjs > /tmp/research-agent-context.txt
          node scripts/validate-docs.mjs
          node scripts/validate-tooling-catalog.mjs
          node scripts/validate-notebooklm-catalog.mjs
          node scripts/validate-agent-contract.mjs
          node scripts/validate-doc-cohesion.mjs
          node scripts/validate-product-readiness.mjs
          echo "source=$source" >> "$GITHUB_OUTPUT"

      - name: Force-publish clean canonical main
        shell: bash
        working-directory: ${{ steps.source.outputs.source }}
        run: |
          set -euo pipefail
          git init -b main
          git config user.name 'Research repository publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: publish complete Research V6 specification'
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin main:main
