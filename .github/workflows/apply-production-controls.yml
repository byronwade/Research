name: Apply production-ready documentation controls

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: apply-production-ready-documentation-controls
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.title == '[system] apply production-ready documentation controls'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out generator branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Preserve generator
        shell: bash
        run: cp tools/apply-production-controls.mjs /tmp/apply-production-controls.mjs

      - name: Apply and validate production controls on main
        shell: bash
        run: |
          set -euo pipefail
          publish=/tmp/research-production-controls
          rm -rf "$publish"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$publish"
          cd "$publish"
          git checkout main
          node /tmp/apply-production-controls.mjs "$publish"
          node scripts/agent-status.mjs
          node scripts/agent-context.mjs > /tmp/research-agent-context.txt
          node scripts/validate-agent-control.mjs
          node scripts/validate-production-readiness.mjs
          node scripts/validate-workflow-security.mjs
          git diff --check
          git config user.name 'Research documentation publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: complete production-readiness control plane'
          git push origin main

      - name: Close trigger pull request
        if: success()
        shell: bash
        run: gh pr close "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --comment 'Production-ready documentation controls were validated and committed directly to main.'
